<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="back">
      <a href="../index.html"
        ><img
          src="../Calc/icons/arrow_back_24dp_000000_FILL0_wght400_GRAD0_opsz24.svg"
      /></a>
    </div>
    <div class="name">Tip Calculator</div>
    <div class="body">
      <div class="bill">
        <div class="b-name">Bill</div>

        <input class="b-input" type="text" id="bill-input" />
      </div>
      <div class="tip">
        <div class="t-name">Select Tip %</div>
        <div class="t-input" id="tips">
          <div class="percen">5%</div>
          <div class="percen">10%</div>
          <div class="percen">15%</div>
          <div class="percen">25%</div>
          <div class="percen">35%</div>
          <div class="percen">50%</div>
          <div class="percen">65%</div>
          <div class="percen">80%</div>
        </div>
      </div>
      <div class="mustpay" id="mustpay">Amount: 0.00</div>
      <div class="reset" id="reset">Reset</div>
    </div>
    <script src="java.js"></script>
  </body>
</html>
