<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="phone">
      <div class="input-sec">
        <input type="text " id="input" />
      </div>
      <div class="middle">
        <div class="mid-left">
          <img class="clock" src="./icons/clock.svg" />
          <img class="ruler" src="./icons/ruler.svg" />
          <img class="math" src="./icons/math.svg" />
        </div>
        <div class="mid-right">
          <img class="backspace" id="backspace" src="./icons/backspace.svg" />
        </div>
      </div>
      <div class="btn-sec">
        <div class="btn grey" id="clear">C</div>
        <div class="btn grey" id="bracket1">(</div>
        <div class="btn grey" id="bracket2">)</div>

        <div class="btn lightgrey" id="divide">/</div>
        <div class="btn" id="seven">7</div>
        <div class="btn" id="eight">8</div>
        <div class="btn" id="nine">9</div>
        <div class="btn lightgrey" id="times">x</div>
        <div class="btn" id="four">4</div>
        <div class="btn" id="five">5</div>
        <div class="btn" id="six">6</div>
        <div class="btn lightgrey" id="minus">-</div>
        <div class="btn" id="one">1</div>
        <div class="btn" id="two">2</div>
        <div class="btn" id="three">3</div>
        <div class="btn lightgrey" id="plus">+</div>
        <div class="btn" id="comma">,</div>
        <div class="btn" id="zero">0</div>
        <div class="btn" id="dot">.</div>
        <div class="btn green" id="equal">=</div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
